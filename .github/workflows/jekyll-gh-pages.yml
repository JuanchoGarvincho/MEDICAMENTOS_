# Workflow para construir y desplegar un sitio de Node.js en GitHub Pages
name: Deploy Node.js site to GitHub Pages

on:
  push:
    branches: ["main"] # Asegúrate de que esta sea tu rama principal
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Puedes ajustar la versión de Node.js
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        # Se usa build en lugar de dev para generar los archivos de producción
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Ajusta esta ruta a tu carpeta de salida (normalmente 'dist' o 'build')
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
